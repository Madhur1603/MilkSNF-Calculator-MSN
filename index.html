<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Milk Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h2>Milk Value Calculator</h2>

        <div class="row">
            <div class="input-group">
                <label for="milk">Quantity:</label>
                <input type="number" id="milk" class="ctnt_box" placeholder="Milk Quantity (L)"
                    onkeydown="moveCursor(event, 'fat')">
            </div>
            <div class="input-group">
                <label for="fat">Fat:</label>
                <input type="number" id="fat" class="ctnt_box" placeholder="Fat (%)"
                    onkeydown="moveCursor(event, 'snf')">
            </div>
        </div>

        <div class="row">
            <div class="input-group">
                <label for="snf">SNF:</label>
                <input type="number" id="snf" class="ctnt_box" placeholder="SNF (%)"
                    onkeydown="moveCursor(event, 'rate')">
            </div>
            <div class="input-group">
                <label for="rate">Rate:</label>
                <input type="number" id="rate" class="ctnt_box" placeholder="Rate"
                    onkeydown="moveCursor(event, 'method')">
            </div>
        </div>

        <div class="row">
            <label for="method">SNF Method:</label>
            <select id="method" onkeydown="moveCursor(event, 'calculate')">
                <option value="60/40">60/40</option>
                <option value="52/48">52/48</option>
            </select>
        </div>

        <div class="btn">
            <button onclick="calc()" id="calculate">Calculate</button>
            <button onclick="refresh()" id="refreshBtn" onkeydown="handleRefreshKey(event)">Refresh</button>
        </div>

        <div class="result" style="display: none;">
            <div class="result-row">
                <span>SNF per Kg Rate:</span>
                <span id="snfPerKgRate">--</span>
            </div>
            <div class="result-row">
                <span>Fat per Kg Rate:</span>
                <span id="fatPerKgRate">--</span>
            </div>
            <div class="result-row">
                <span>Value of Powder:</span>
                <span id="powderValue">--</span>
            </div>
            <div class="result-row">
                <span>Value of Fat:</span>
                <span id="fatValue">--</span>
            </div>
            <div class="result-row">
                <strong>Total Value:</strong>
                <strong id="totalValue">--</strong>
            </div>
            <div class="result-row">
                <strong>Average Rate:</strong>
                <strong id="avgRate">--</strong>
            </div>
        </div>
    </div>

    <script src="script.js" defer></script>

</body>

</html>
